<section role="complementary" class="alert alert-{{self::announcement_type_color(*announcement.announcement_type)}} d-flex flex-row" aria-label="Bekanntmachung">
    <div>
        <i class="bi bi-{{self::announcement_type_icon(*announcement.announcement_type)}}"
           title="{{self::announcement_type_name(*announcement.announcement_type)}}" aria-hidden="true"></i>
        <span class="visually-hidden">{{self::announcement_type_name(*announcement.announcement_type)}}</span>
    </div>
    <div class="flex-grow-1 inner-margin-fix ms-3">
        {{announcement.text|markdown}}
    </div>
</section>
